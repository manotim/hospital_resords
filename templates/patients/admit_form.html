{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Admit Patient - Hospital Records{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Admit Patient: {{ patient.get_full_name }}</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="mt-3">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-procedures"></i> Admit Patient
                            </button>
                            <a href="{% url 'patients:patient_detail' patient.pk %}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
