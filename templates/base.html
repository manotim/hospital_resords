<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hospital Records Management System{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'includes/navbar.html' %}
    
    <div class="container-fluid">
        <div class="row">
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show mt-3" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
                
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>
    
    {% include 'includes/footer.html' %}
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Custom JS -->
    <script src="{% static 'js/main.js' %}"></script>
    
    <!-- Global JavaScript Functions -->
    <script>
        // Global functions for navigation actions
        function showRecordSelector(action) {
            // Redirect to patient list with action parameter
            if (action === 'order_lab') {
                window.location.href = '/patients/?action=order_lab';
            } else if (action === 'add_prescription') {
                window.location.href = '/patients/?action=add_prescription';
            } else if (action === 'add_procedure') {
                window.location.href = '/patients/?action=add_procedure';
            } else if (action === 'add_clinical_note') {
                window.location.href = '/patients/?action=add_note';
            }
            return false;
        }

        function showPatientSelector(action) {
            // Redirect to patient list with action parameter for new records
            if (action === 'create_and_lab') {
                window.location.href = '/patients/?action=create_and_lab';
            } else if (action === 'create_and_prescribe') {
                window.location.href = '/patients/?action=create_and_prescribe';
            } else if (action === 'create_and_imaging') {
                window.location.href = '/patients/?action=create_and_imaging';
            } else if (action === 'create_and_procedure') {
                window.location.href = '/patients/?action=create_and_procedure';
            } else if (action === 'create_and_note') {
                window.location.href = '/patients/?action=create_and_note';
            }
            return false;
        }

        function showQuickStats(statType) {
            // Show quick stats modal or redirect
            alert('Quick stats feature coming soon!');
            return false;
        }

        // Auto-hide alerts after 5 seconds
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const alerts = document.querySelectorAll('.alert');
                alerts.forEach(function(alert) {
                    const bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                });
            }, 5000);
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
